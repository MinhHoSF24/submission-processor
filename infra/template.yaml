AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Submission Processor — Lambda reads SQS, validates, and saves to S3.
  Creates: Lambda + IAM Role + SQS Event Source Mapping + CloudWatch Log Group.
  SQS queue & S3 bucket are referenced via parameters (pre-existing).

# ──────────────────────────────────────────────────────────────────────────────
Parameters:
  Environment:
    Type: String
    Default: nonprod
    Description: >
      Environment name (nonprod, prod) or branch slug (e.g. use1160426).
      Used to name resources: submission-processor-<Environment>.

  S3BucketName:
    Type: String
    Description: S3 bucket name to store submissions

  SqsQueueArn:
    Type: String
    Description: ARN of the pre-existing SQS queue

  SqsQueueUrl:
    Type: String
    Description: URL of the SQS queue (passed to Lambda env)

  LambdaS3Bucket:
    Type: String
    Description: S3 bucket containing the lambda.zip artifact

  LambdaS3Key:
    Type: String
    Description: S3 key of the lambda.zip (e.g. submission-processor/nonprod/abc123.zip)

  LogLevel:
    Type: String
    Default: info
    AllowedValues: [debug, info, warn, error]

  LogRetentionDays:
    Type: Number
    Default: 30
    AllowedValues: [1, 3, 5, 7, 14, 30, 60, 90, 120, 150, 180, 365]
    Description: Number of days to retain logs in CloudWatch

# ──────────────────────────────────────────────────────────────────────────────
Resources:

  # ─── IAM Role for Lambda ─────────────────────────────────────────────────
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "submission-processor-${Environment}-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: cloudwatch-logs
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !GetAtt SubmissionProcessorLogGroup.Arn

        - PolicyName: sqs-receive
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource: !Ref SqsQueueArn

        - PolicyName: s3-put
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                Resource: !Sub "arn:aws:s3:::${S3BucketName}/*"

        - PolicyName: ssm-read
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/*"

  # ─── CloudWatch Log Group ────────────────────────────────────────────────
  # Created before Lambda to control retention; prevents Lambda from auto-creating without retention.
  SubmissionProcessorLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/submission-processor-${Environment}"
      RetentionInDays: !Ref LogRetentionDays

  # ─── Lambda Function ─────────────────────────────────────────────────────
  SubmissionProcessorFunction:
    Type: AWS::Lambda::Function
    DependsOn: SubmissionProcessorLogGroup
    Properties:
      FunctionName: !Sub "submission-processor-${Environment}"
      Runtime: nodejs22.x
      Handler: dist/handler.handler
      Timeout: 30
      MemorySize: 256
      Role: !GetAtt LambdaExecutionRole.Arn
      LoggingConfig:
        LogGroup: !Ref SubmissionProcessorLogGroup
        LogFormat: JSON
        ApplicationLogLevel: !Ref LogLevel
        SystemLogLevel: WARN
      Code:
        S3Bucket: !Ref LambdaS3Bucket
        S3Key: !Ref LambdaS3Key
      Environment:
        Variables:
          NODE_ENV: production
          AWS_REGION_CUSTOM: !Ref "AWS::Region"
          S3_BUCKET_NAME: !Ref S3BucketName
          SQS_QUEUE_URL: !Ref SqsQueueUrl
          LOG_LEVEL: !Ref LogLevel

  # ─── SQS → Lambda Event Source Mapping ───────────────────────────────────
  SqsEventSourceMapping:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      EventSourceArn: !Ref SqsQueueArn
      FunctionName: !GetAtt SubmissionProcessorFunction.Arn
      BatchSize: 10
      MaximumBatchingWindowInSeconds: 5
      FunctionResponseTypes:
        - ReportBatchItemFailures
      Enabled: true

# ──────────────────────────────────────────────────────────────────────────────
Outputs:
  LambdaFunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt SubmissionProcessorFunction.Arn

  LambdaFunctionName:
    Description: Lambda function name
    Value: !Ref SubmissionProcessorFunction

  LambdaRoleArn:
    Description: IAM Role ARN
    Value: !GetAtt LambdaExecutionRole.Arn

  LogGroupName:
    Description: CloudWatch Log Group name
    Value: !Ref SubmissionProcessorLogGroup

  LogGroupArn:
    Description: CloudWatch Log Group ARN
    Value: !GetAtt SubmissionProcessorLogGroup.Arn

##############################################################################
# Nonprod Destroy — triggered when a PR is merged or closed against main.
# Tears down the CloudFormation stack + S3 artifacts for that branch.
##############################################################################
name: Destroy Nonprod (PR merged/closed)

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  prepare:
    name: Prepare branch slug
    runs-on: ubuntu-latest
    outputs:
      branch-slug: ${{ steps.slug.outputs.branch-slug }}
    steps:
      - name: Slugify branch name
        id: slug
        run: |
          RAW="${{ github.head_ref }}"
          SLUG=$(echo "$RAW" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g' | sed 's/^-//;s/-$//' | cut -c1-40)
          echo "branch-slug=${SLUG}" >> "$GITHUB_OUTPUT"
          echo "Branch: $RAW → Slug: $SLUG → Destroying stack"

  destroy:
    name: Destroy
    needs: prepare
    uses: ./.github/workflows/destroy.yml
    with:
      branch-slug: ${{ needs.prepare.outputs.branch-slug }}
      aws-region: ap-southeast-1
      cfn-stack-name: submission-processor
      artifact-s3-bucket: my-lambda-artifacts-bucket
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN_NONPROD }}
